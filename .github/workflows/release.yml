name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Run ASKILL validation + package
        shell: powershell
        run: .\package.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ado-cowork-plugin.zip
          body_path: CHANGELOG.md
          generate_release_notes: false
