name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ASKILL validation
        shell: powershell
        run: .\package.ps1

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v7
        with:
          name: ado-cowork-plugin-zip
          path: ado-cowork-plugin.zip
          if-no-files-found: error
